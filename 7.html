  {q: "Câu 134. Luận điểm: “Sự phát triển của chính trị, pháp luật, triết học, tôn giáo, văn học, nghệ thuật, v.v. đều dựa trên cơ sở phát triển kinh tế. Nhưng tất cả chúng cũng có ảnh hưởng lẫn nhau và ảnh hưởng đến cơ sở kinh tế” thuộc lập trường triết học nào dưới đây:", a: ["Chủ nghĩa duy vật lịch sử", "Chủ nghĩa duy tâm lịch sử", "Chủ nghĩa duy tâm chủ quan", "Chủ nghĩa duy kinh tế"], c: 0},
  {q: "Câu 135. Phát hiện đáp án sai về con người theo quan điểm của chủ nghĩa Mác Lênin trong các đáp án dưới đây:", a: ["Con người là thực thể sinh học - xã hội", "Con người là sản phẩm của lịch sử và của chính bản thân con người", "Con người vừa là chủ thể của lịch sử, vừa là sản phẩm của lịch sử", "Con người là sản phẩm của thượng đế"], c: 3},
  {q: "Câu 136. Phát hiện đáp án sai về Sự phát triển trong các đáp án dưới đây:", a: ["Phát triển là quá trình vận động từ thấp đến cao, từ kém hoàn thiện đến hoàn thiện hơn, từ chất cũ đến chất mới ở trình độ cao hơn.", "Phát triển là sự tăng lên hoặc giảm đi về mặt lượng, chỉ là sự tuần hoàn, lặp đi, lặp lại mà không có sự thay đổi về chất.", "Phát triển là vận động nhưng không phải mọi vận động đều là phát triển.", "Đặc điểm chung của sự phát triển là tính tiến lên theo đường xoáy ốc, có kế thừa, có sự dường như lặp lại sự vật, hiện tượng cũ nhưng trên cơ sở cao hơn."], c: 1},
  {q: "Câu 137. Phát hiện đáp án sai về Nhận thức trong các đáp án dưới đây:", a: ["Nhận thức là quá trình phản ánh hiện thực khách quan, là quá trình tạo thành tri thức về thế giới khách quan trong bộ óc con người", "Nhận thức là quá trình tác động biện chứng giữa chủ thể nhận thức và khách thể nhận thức trên cơ sở hoạt động thực tiễn của con người.", "Nhận thức là quá trình phản ánh hiện thực khách quan một cách tích cực, chủ động, sáng tạo bởi con người trên cơ sở thực tiễn mang tính lịch sử cụ thể.", "Nhận thức là quá trình phản ánh hiện thực khách quan một cách thụ động của con người trên cơ sở thực tiễn mang tính lịch sử cụ thể."], c: 3},
  {q: "Câu 138. Tìm đáp án thể hiện quan điểm Duy tâm về vai trò của Ý thức trong các đáp án dưới đây:", a: ["Ý thức tự nó chỉ làm thay đổi tư tưởng. Như vậy ý thức hoàn toàn không có tác dụng gì đối với thực tiễn.", "Ý thức là phản ánh sáng tạo thực tại khách quan và đồng thời có tác động trở lại mạnh mẽ thực tại đó thông qua hoạt động thực tiễn của con người.", "Ý thức là cái phụ thuộc vào nguồn gốc sinh ra nó. Vì thế chỉ có vật chất mới là cái năng động, tích cực", "Ý thức là cái quyết định vật chất. Vật chất chỉ là cái thụ động, phụ thuộc vào ý thức."], c: 3},
  {q: "Câu 139. Tìm đáp án thể hiện đúng nhất quan điểm Duy vật biện chứng về mối liên hệ của các sự vật, hiện tượng trong các đáp án dưới đây:", a: ["Là sự tác động lẫn nhau, chi phối chuyển hoá lẫn nhau một cách khách quan, phổ biến, nhiều vẻ giữa các mặt, quá trình của sự vật, hiện tượng, hoặc giữa các sự vật, hiện tượng.", "Là sự thừa nhận rằng giữa các mặt, các yêu tố cấu thành sự vật, hiện tượng và giữa các sự vật với nhau trong thực tế khách quan không có mối liên hệ nào cả.", "Sai lầm của phép siêu hình là ở chỗ ngoài tính khách quan, tính phổ biến của mối liên hệ còn đưa ra quan điểm về tính phong phú của mối liên hệ.", "Là sự tác động lẫn nhau, có tính khách quan, phổ biến, nhiều vẻ, có thể chuyển hoá cho nhau."], c: 0},
  {q: "Câu 140. Tìm đáp án đúng nhất về tính chất của sự Phát triển theo Phép biện chứng duy vật trong các đáp án dưới đây:", a: ["Tính khách quan, tính phổ biến, tính kế thừa và tính đa dạng phong phú", "Tính sáng tạo, tính phổ biến, tính kế thừa và tính đa dạng phong phú", "Tính chủ quan, tính phổ biến, tính kế thừa và tính đa dạng phong phú", "Tính chọn lọc, tính phổ biến, tính kế thừa và tính đa dạng phong phú"], c: 0},
  {q: "Câu 141. Xác định đáp án đúng và đầy đủ nhất về Thực tiễn trong những đáp án dưới đây:", a: ["Là toàn bộ những hoạt động của con người có tính vật chất, tính mục đích, tính xã hội - lịch sử làm biến đổi tự nhiên, xã hội theo hướng tích cực, tiến bộ, phục vụ cho lợi ích con người, trong đó sản xuất vật chất là thực tiễn cơ bản nhất.", "Là toàn bộ những hoạt động của con người có tính mục đích, tính xã hội - lịch sử làm biến đổi tự nhiên, xã hội theo hướng tích cực, tiến bộ, trong đó sản xuất vật chất là thực tiễn cơ bản nhất.", "Là toàn bộ những hoạt động của con người có tính mục đích, tính vật chất, làm biến đổi tự nhiên - xã hội theo hướng tích cực, trong đó sản xuất vật chất là thực tiễn cơ bản nhất.", "Là toàn bộ những hoạt động của con người có tính mục đích, tính vật chất, tính lịch sử - xã hội, trong đó sản xuất tinh thần là thực tiễn cơ bản nhất."], c: 1},
  {q: "Câu 142. Xác định quan niệm sai về Chân lý trong các quan niệm dưới đây:", a: ["Nội dung chân lý là chủ quan vì nó do đầu óc con người tạo ra.", "Chân lý bao giờ cũng cụ thể, không có chân lý trừu tượng.", "Có thể hiểu chân lý cũng là sự phù hợp giữa chủ quan với khách quan.", "Chân lý là kiến thức đúng đắn được thực tiễn kiểm nghiệm."], c: 0},
  {q: "Câu 143. Xác định quan niệm sai về Chân lý trong các quan niệm dưới đây:", a: ["Nội dung chân lý có tính khách quan, còn hình thức biểu hiện chân lý thì mang tính chủ quan.", "Chân lý bao giờ cũng là chân lý trừu tượng.", "Có thể hiểu chân lý cũng là sự phù hợp giữa chủ quan với khách quan.", "Chân lý là kiến thức đúng đắn được thực tiễn kiểm nghiệm."], c: 1},
  {q: "Câu 144. Xác định quan niệm sai về Chân lý trong các quan niệm dưới đây:", a: ["Nội dung chân lý có tính khách quan, còn hình thức biểu hiện chân lý thì mang tính chủ quan.", "Chân lý bao giờ cũng cụ thể, không có chân lý trừu tượng.", "Có thể hiểu chân lý là sự phù hợp giữa nhận thức với các nguyên lý trong sách vở.", "Chân lý là kiến thức đúng đắn được thực tiễn kiểm nghiệm."], c: 2},
  {q: "Câu 145. Xác định quan niệm sai về Chân lý trong các quan niệm dưới đây:", a: ["Nội dung chân lý có tính khách quan, còn hình thức biểu hiện chân lý thì mang tính chủ quan.", "Chân lý bao giờ cũng cụ thể, không có chân lý trừu tượng.", "Chân lý là kiến thức đúng đắn được thực tiễn kiểm nghiệm.", "Chân lý là kiến thức được số đông chấp nhận."], c: 3},
  {q: "Câu 146. Tìm luận điểm đúng nhất về mối quan hệ biện chứng giữa Bản chất và Hiện tượng trong các luận điểm dưới đây:", a: ["Hiện tượng biểu hiện ra bên ngoài của bản chất, thường làm sai lệch bản chất nên tốt nhất là nhận thức, hành động đi thẳng vào bản chất sẽ tránh được sai lầm.", "Phương pháp nhận thức đúng là đi từ hiện tượng đến bản chất, đi từ bản chất ít sâu sắc đến bản chất sâu sắc hơn, không nhầm lẫn hiện tượng với bản chất.", "Nhận thức và hành động của con người không thể đạt tới bản chất của sự vật vì nó bị vô số hiện tượng bao bọc bên ngoài, trong đó lại có những hiện tượng làm sai lạc, xuyên tạc bản chất.", "Chỉ có bản chất mới là mối quan hệ khách quan, còn hiện tượng là mối quan hệ chủ quan do tác động tiêu cực của con người tạo ra làm sai lạc bản chất. Nên muốn nhận thức đúng bản chất, con người đi thẳng vào tìm hiểu và nắm lấy bản chất sẽ tránh được sai lầm."], c: 1},
  {q: "Câu 147. Tìm câu thể hiện đúng nhất về ý nghĩa phương pháp luận của mối quan hệ biện chứng giữa Nội dung và Hình thức trong các câu dưới đây:", a: ["Trong nhận thức và hành động không được tách rời hoặc tuyệt đối hoá một mặt nội dung hay hình thức. Phải coi trọng nội dung đồng thời phải chú trọng thích đáng tới hình thức, bảo đảm cho nội dung có một hình thức phù hợp nhất. Khi một trong chúng đã tỏ ra lỗi thời thì phải thay đổi cho phù hợp.", "Trong nhận thức và hành động không được tách rời, tuyệt đối hoá một mặt nội dung hay hình thức. Trước hết phải chú trọng vai trò quyết định của hình thức đồng thời coi trọng nội dung. Khi một trong chúng đã lỗi thời thì phải thay đổi cho phù hợp, chống chủ nghĩa hình thức.", "Trong nhận thức và hành động không được tách rời, tuyệt đối hoá một mặt nội dung hay hình thức. Trước hết phải chú trọng vai trò quyết định của nội dung.", "Trong nhận thức và hành động không được tuyệt đối hoá một mặt nội dung hay hình thức."], c: 0},
  {q: "Câu 148. Tìm luận điểm thể hiện quan điểm Siêu hình về mối quan hệ giữa Nguyên nhân - Kết quả trong các luận điểm dưới đây:", a: ["Trong những điều kiện xác định, nguyên nhân có trước kết quả, một nguyên nhân sinh ra nhiều kết quả và ngược lại, nguyên nhân và kết quả có thể chuyển hoá cho nhau.", "Trong điều kiện xác định, nguyên nhân có trước kết quả, một nguyên nhân chỉ sinh ra một kết quả và ngược lại, nguyên nhân và kết quả không thể chuyển hoá cho nhau.", "Trong điều kiện xác định, nguyên nhân có sau kết quả. Một nguyên nhân có thể sinh ra nhiều kết quả và ngược lại. Nguyên nhân và kết quả có thể chuyển hoá cho nhau.", "Trong điều kiện xác định, nguyên nhân có trước kết quả, một nguyên nhân sinh ra nhiều kết quả và ngược lại. Nguyên nhân và kết quả có thể chuyển hoá cho nhau trong quá trình vận động."], c: 1},
  {q: "Câu 149. Tìm luận điểm thể hiện quan điểm Duy tâm về ý nghĩa phương pháp luận rút ra từ quan hệ Nguyên nhân – Kết quả trong các luận điểm dưới đây:", a: ["Để có kết quả theo mong muốn phải biết phát hiện và điều khiển các nguyên nhân, khắc phục những nguyên nhân ngược chiều, tạo điều kiện cho nguyên nhân cùng chiều hướng tới kết quả.", "Vì nguyên nhân có trước kết quả nên muốn có kết quả theo mong muốn thì chờ đợi ở nguyên nhân sẽ xảy ra. Sau đó lại sử dụng kết quả đó tạo ra nguyên nhân tiếp sau để được hưởng kết quả cao hơn.", "Quan hệ nhân quả là quan hệ do chủ quan của con người tạo ra cho nên trong nhận thức và hành động con người chắc chắn nhận được kết quả do mình tạo ra.", "Nguyên nhân có trước kết quả vì thế cứ chờ đợi thì sớm hay muộn kết quả sẽ tới."], c: 2},
  {q: "Câu 150. Tìm luận điểm thể hiện đúng nhất về giá trị phương pháp luận của mối quan hệ giữa cái Tất nhiên và Ngẫu nhiên trong các luận điểm dưới đây:", a: ["Thông qua nghiên cứu nhiều cái ngẫu nhiên để phát hiện cái tất nhiên. Dựa vào cái tất nhiên để hành động đồng thời dự phòng xử lý kịp thời với cái ngẫu nhiên.", "Mục đích của nhận thức và hành động là đạt tới cái tất nhiên để có tự do. Nhưng cái tất nhiên tồn tại như vật tự nó nên con người chỉ có thể nắm được cái ngẫu nhiên.", "Nắm lấy cái tất nhiên, chi phối, điều khiển, phòng ngừa cái ngẫu nhiên. Đó là mục đích của nhận thức và hành động của con người trong khi giải quyết mối quan hệ giữa tất nhiên và ngẫu nhiên.", "Nắm lấy cái tất nhiên để chi phối, điều khiển, phòng ngừa mặt tác hại của ngẫu nhiên. Nhận thức không phải bằng cách đi từ phân tích ngẫu nhiên mà đi thẳng vào cái tất nhiên."], c: 0}
];

let sessionQuiz = [], currentIndex = 0, activeQueue = [], skippedQueue = [], userAnswers = {}, score = 0, combo = 0, wrongStreak = 0, isPhaseSkipped = false;
let timerInterval;
let timeLeft = 0;
let autoNextTimer;
let sessionTotal = 0;

const elInterface = document.getElementById("quiz-interface");
const elResult = document.getElementById("result-interface");
const elQuestion = document.getElementById("question");
const elAnswers = document.getElementById("answers");
const elCounter = document.getElementById("question-counter");
const elCombo = document.getElementById("combo-display");
const elProgressBar = document.getElementById("progress-bar");
const elBtnNext = document.getElementById("btn-next");
const elBtnSkip = document.getElementById("btn-skip");
const elBtnPrev = document.getElementById("btn-prev");
const elTimer = document.getElementById("timer-display");
const elResultTime = document.getElementById("result-time");
const elControlPopup = document.getElementById("control-popup");
const elReviewContainer = document.getElementById("review-container");
const elBtnRetryWrong = document.getElementById("btn-retry-wrong");

function initGame(retryWrongOnly = false) {
    score = 0; combo = 0; wrongStreak = 0; currentIndex = 0;
    activeQueue = []; skippedQueue = []; isPhaseSkipped = false;
    if (!retryWrongOnly) userAnswers = {};

    const urlParams = new URLSearchParams(window.location.search);
    const configShuffleQ = urlParams.get('sq') !== 'false'; 
    const configTime = parseInt(urlParams.get('time')) || 0;

    if (retryWrongOnly) {
        let wrongIndices = [];
        originalQuiz.forEach((item, idx) => {
            if (userAnswers.hasOwnProperty(idx)) {
                if (userAnswers[idx] !== item.c) wrongIndices.push(idx);
            }
        });
        
        if (wrongIndices.length === 0) {
            alert("Bạn không có câu sai nào để làm lại!");
            return;
        }

        userAnswers = {}; 
        sessionQuiz = originalQuiz.map((item, originalIdx) => {
             let options = item.a.map((txt, idx) => ({ text: txt, isCorrect: idx === item.c }));
             return { q: item.q, a: options.map(opt => opt.text), c: options.findIndex(opt => opt.isCorrect), originalId: originalIdx };
        });
        
        activeQueue = wrongIndices;
        if(configShuffleQ) shuffleArray(activeQueue);
    } else {
        sessionQuiz = originalQuiz.map((item, originalIdx) => {
            let options = item.a.map((txt, idx) => ({ text: txt, isCorrect: idx === item.c }));
            return { q: item.q, a: options.map(opt => opt.text), c: options.findIndex(opt => opt.isCorrect), originalId: originalIdx };
        });

        let indices = sessionQuiz.map((_, i) => i);
        if(configShuffleQ) shuffleArray(indices);
        activeQueue = indices;
    }
    
    sessionTotal = activeQueue.length;

    elInterface.style.display = "flex";
    elResult.style.display = "none";
    elControlPopup.style.display = "flex";

    if (configTime > 0) {
        timeLeft = configTime * 60;
        startCountdown();
    } else {
        timeLeft = 0;
        startCountUp();
    }

    updateStats();
    loadQuestion();
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startCountdown() {
    clearInterval(timerInterval);
    updateTimerDisplay(timeLeft);
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay(timeLeft);
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("⏰ Hết giờ! Bài thi sẽ tự động nộp.");
            finishGame();
        }
    }, 1000);
}

function startCountUp() {
    clearInterval(timerInterval);
    updateTimerDisplay(timeLeft);
    timerInterval = setInterval(() => {
        timeLeft++;
        updateTimerDisplay(timeLeft);
    }, 1000);
}

function updateTimerDisplay(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    elTimer.innerText = `${m}:${s}`;
    
    const urlParams = new URLSearchParams(window.location.search);
    const limit = parseInt(urlParams.get('time')) || 0;
    
    if (limit > 0 && seconds < 60) elTimer.classList.add('danger');
    else elTimer.classList.remove('danger');
}

function loadQuestion() {
    clearTimeout(autoNextTimer);

    const qIndex = activeQueue[currentIndex];
    const data = sessionQuiz[qIndex];
    const hasAnswered = userAnswers.hasOwnProperty(qIndex);

    elQuestion.innerText = data.q;
    elAnswers.innerHTML = "";

    if (isPhaseSkipped) {
        document.getElementById("phase-display").style.display = "inline-block";
        elCounter.innerText = `Câu bỏ qua ${currentIndex + 1}/${activeQueue.length}`;
    } else {
        document.getElementById("phase-display").style.display = "none";
        elCounter.innerText = `Câu ${currentIndex + 1}/${activeQueue.length}`;
    }

    const labels = ["A", "B", "C", "D"];
    data.a.forEach((ans, idx) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = `<b>${labels[idx]}.</b> ${ans}`;
        
        if (hasAnswered) {
            btn.disabled = true;
            const userPick = userAnswers[qIndex];
            if (idx === data.c) btn.classList.add("correct");
            if (idx === userPick && userPick !== data.c) btn.classList.add("wrong");
            if (idx === userPick) btn.classList.add("user-selected");
        } else {
            btn.onclick = () => checkAnswer(qIndex, idx, btn);
        }
        elAnswers.appendChild(btn);
    });

    elBtnPrev.disabled = (currentIndex === 0 && !isPhaseSkipped);
    
    if (hasAnswered) {
        elBtnSkip.style.display = "none";
        elBtnNext.style.display = "block";
    } else {
        elBtnSkip.style.display = "block";
        elBtnNext.style.display = "none";
    }

    updateStats();
}

function checkAnswer(qIndex, selectedIdx, btnElement) {
    const data = sessionQuiz[qIndex];
    const isCorrect = selectedIdx === data.c;
    userAnswers[qIndex] = selectedIdx;

    const allBtns = elAnswers.querySelectorAll(".option-btn");
    allBtns.forEach((btn, idx) => {
        btn.disabled = true;
        
        if (idx === data.c) {
            btn.classList.add("correct");
            if (!isCorrect) {
                btn.classList.add("flash-correct");
            }
        }
        
        if (idx === selectedIdx && !isCorrect) {
            btn.classList.add("wrong");
        }
    });

    if (isCorrect) {
        score++; combo++; wrongStreak = 0;
        triggerMiniConfetti(btnElement);
    } else {
        combo = 0; wrongStreak++;
    }

    elBtnNext.style.display = "block";
    elBtnSkip.style.display = "none";
    updateStats();

    autoNextTimer = setTimeout(() => {
        nextQuestion();
    }, 1200);
}

function nextQuestion() {
    clearTimeout(autoNextTimer);
    if (currentIndex < activeQueue.length - 1) {
        currentIndex++;
        loadQuestion();
    } else {
        handleEndOfQueue();
    }
}

function skipQuestion() {
    clearTimeout(autoNextTimer);
    const qIndex = activeQueue[currentIndex];
    skippedQueue.push(qIndex);
    if (currentIndex < activeQueue.length - 1) {
        currentIndex++;
        loadQuestion();
    } else {
        handleEndOfQueue();
    }
}

function goBack() {
    clearTimeout(autoNextTimer);
    if (currentIndex > 0) {
        currentIndex--;
        loadQuestion();
    }
}

function handleEndOfQueue() {
    if (!isPhaseSkipped && skippedQueue.length > 0) {
        if(confirm(`Bạn đã bỏ qua ${skippedQueue.length} câu. Bạn có muốn làm lại ngay bây giờ không?`)) {
             isPhaseSkipped = true;
            activeQueue = [...skippedQueue];
            skippedQueue = [];
            currentIndex = 0;
            loadQuestion();
        } else {
            finishGame();
        }
    } else {
        finishGame();
    }
}

function updateStats() {
    const pct = ((currentIndex + 1) / activeQueue.length) * 100;
    elProgressBar.style.width = `${pct}%`;
    elCombo.innerText = combo > 0 ? `🔥 ${combo}` : "";
}

function finishGame() {
    clearInterval(timerInterval);
    elInterface.style.display = "none";
    elResult.style.display = "block";
    elControlPopup.style.display = "none"; 
    
    elResultTime.innerText = `Thời gian làm bài: ${elTimer.innerText}`;

    const total = sessionTotal; 
    const correctCount = score;
    const wrongCount = total - score;
    const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

    const circle = document.getElementById("score-circle");
    circle.style.background = `conic-gradient(var(--success) ${percent}%, var(--border-color) 0%)`;
    document.getElementById("final-score").innerText = `${percent}%`;

    document.getElementById("txt-correct").innerText = `${correctCount}/${total}`;
    document.getElementById("txt-wrong").innerText = wrongCount;

    elReviewContainer.innerHTML = "";
    let hasWrong = false;

    sessionQuiz.forEach((item, qIndex) => {
        const uAns = userAnswers[qIndex];
        const correctAns = item.c;
        if (uAns !== undefined && uAns !== correctAns) {
            hasWrong = true;
            const labels = ["A", "B", "C", "D"];
            
            const div = document.createElement("div");
            div.className = "review-item";
            div.innerHTML = `
                <div class="review-question">Câu ${qIndex + 1}: ${item.q}</div>
                <div class="review-detail">
                    <div style="color: var(--danger)">❌ Bạn chọn: ${labels[uAns]}. ${item.a[uAns]}</div>
                    <div style="color: var(--success)">✅ Đáp án đúng: ${labels[correctAns]}. ${item.a[correctAns]}</div>
                </div>
            `;
            div.onclick = function() {
                this.classList.toggle("active");
            }
            elReviewContainer.appendChild(div);
        }
    });

    if (!hasWrong) {
        elReviewContainer.innerHTML = `<p style="color: var(--success); font-weight: bold;">Xuất sắc! Bạn không sai câu nào! 🎉</p>`;
        elBtnRetryWrong.style.display = "none";
    } else {
        elBtnRetryWrong.style.display = "block";
    }
}

function retryWrongAnswers() {
    initGame(true);
}

initGame(false);
</script>
