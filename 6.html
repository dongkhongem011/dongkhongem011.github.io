  {q: "Câu 93: Theo pháp luật hình sự hiện hành của nước ta, tội xâm phạm quyền sở hữu công nghiệp được hiểu là gì?", a: ["Là hành vi cố ý xâm phạm quyền sở hữu công nghiệp đối với nhãn hiệu hàng hóa đang được bảo hộ tại Việt Nam với quy mô thương mại.", "Là hành vi cố ý xâm phạm quyền sở hữu công nghiệp đối với nhãn hiệu dịch vụ đang được bảo hộ tại Việt Nam với quy mô thương mại.", "Là hành vi cố ý xâm phạm quyền sở hữu công nghiệp đối với nhãn hiệu hoặc chỉ dẫn địa lý đang được bảo hộ tại Việt Nam với quy mô thương mại.", "Là hành vi cố ý xâm phạm quyền sở hữu công nghiệp đối với chỉ dẫn địa lý đang được bảo hộ tại Việt Nam với quy mô thương mại."], c: 2},
  {q: "Câu 94: Theo pháp luật tố tụng hiện hành của nước ta, Luật tố tụng được hiểu là gì?", a: ["Là văn bản pháp luật, là bộ phận của pháp luật Việt Nam điều chỉnh các quan hệ xã hội phát sinh từ hoạt động tố tụng tại Tòa án hoặc Trọng tài thương mại.", "Là hệ thống văn bản pháp luật Việt Nam điều chỉnh các quan hệ xã hội phát sinh từ hoạt động tố tụng tại Tòa án nhân dân theo các trình tự, thủ thục đặc biệt.", "Là bộ phận của pháp luật Việt Nam điều chỉnh các quan hệ xã hội phát sinh từ hoạt động tố tụng dân sự, hành chính, hình sự tại Tòa án nhân dân có thẩm quyền.", "Là bộ phận của pháp luật Việt Nam điều chỉnh các quan hệ xã hội phát sinh từ hoạt động tố tụng tại Trọng tài thương mại theo sự lựa chọn của các bên tranh chấp."], c: 0},
  {q: "Câu 95: Theo pháp luật tố tụng hiện hành của nước ta, Tòa án giải quyết các vụ án dân sự, kinh tế-thương mại, hành chính, hình sự theo các thủ tục nào?", a: ["Thủ tục sơ thẩm; Thủ tục phúc thẩm, Thủ tục giám đốc thẩm; Thủ tục tái thẩm.", "Thủ tục sơ thẩm; Thủ tục phúc thẩm, Thủ tục hòa giải; Thủ tục tái thẩm.", "Thủ tục sơ thẩm; Thủ tục phúc thẩm, Thủ tục hòa giải; Thủ tục rút gọn.", "Thủ tục sơ thẩm; Thủ tục hòa giải, Thủ tục giám đốc thẩm; Thủ tục rút gọn."], c: 0},

  {q: "Câu 97: Theo pháp luật tố tụng hiện hành của nước ta, thỏa thuận trọng tài được hiểu là gì?", a: ["Là điều khoản trong hợp đồng kinh tế, thương mại giữa các bên về việc giải quyết bằng Trọng tài các tranh chấp có thể phát sinh trong tương lai.", "Là văn bản thoả thuận giữa các bên được đính kèm hợp đồng kinh tế, thương mại về việc giải quyết bằng Trọng tài các tranh chấp có thể phát sinh trong tương lai.", "Là thoả thuận hợp pháp giữa các bên về việc giải quyết bằng Trọng tài tranh chấp có thể phát sinh hoặc đã phát sinh.", "Là thoả thuận hợp pháp giữa các bên về việc giải quyết bằng Trọng tài các tranh chấp đã phát sinh giữa các bên đó."], c: 2},

  {q: "Câu 99: Theo pháp luật tố tụng hiện hành của nước ta, Trọng tài thương mại giải quyết các tranh chấp kinh tế-thương mại theo thủ tục nào?", a: ["Thủ tục sơ-chung thẩm", "Thủ tục sơ thẩm; Thủ tục rút gọn.", "Thủ tục sơ thẩm; Thủ tục phúc thẩm.", "Thủ tục sơ thẩm; Thủ tục hòa giải."], c: 0},
  {q: "Câu 100: Theo pháp luật tố tụng hiện hành của nước ta, chứng cứ trong vụ án được hiểu là gì?", a: ["Là những gì thu thập được theo trình tự, thủ tục do các luật cụ thể quy định mà Tòa án có thẩm quyền dùng làm căn cứ cần thiết để giải quyết đúng đắn vụ án.", "Là những gì có thật, được thu thập theo trình tự, thủ tục do luật định mà Cơ quan tố tụng dùng làm căn cứ cần thiết cho việc giải quyết đúng đắn vụ án.", "Là những gì có thật, thu thập được theo trình tự, thủ tục do luật định mà Tòa án dùng làm căn cứ để giải quyết đúng đắn vụ án đã được đưa đến Tòa.", "Là những gì cá nhân, cơ quan, tổ chức liên quan giao nộp cho cơ quan tố tụng và được cơ quan tố tụng dùng làm căn cứ cần thiết cho việc giải quyết đúng đắn vụ án."], c: 1}
];

let sessionQuiz = [], currentIndex = 0, activeQueue = [], skippedQueue = [], userAnswers = {}, score = 0, combo = 0, wrongStreak = 0, isPhaseSkipped = false;
let timerInterval;
let timeLeft = 0;
let autoNextTimer;
let sessionTotal = 0;

const elInterface = document.getElementById("quiz-interface");
const elResult = document.getElementById("result-interface");
const elQuestion = document.getElementById("question");
const elAnswers = document.getElementById("answers");
const elCounter = document.getElementById("question-counter");
const elCombo = document.getElementById("combo-display");
const elProgressBar = document.getElementById("progress-bar");
const elBtnNext = document.getElementById("btn-next");
const elBtnSkip = document.getElementById("btn-skip");
const elBtnPrev = document.getElementById("btn-prev");
const elTimer = document.getElementById("timer-display");
const elResultTime = document.getElementById("result-time");
const elControlPopup = document.getElementById("control-popup");
const elReviewContainer = document.getElementById("review-container");
const elBtnRetryWrong = document.getElementById("btn-retry-wrong");

function initGame(retryWrongOnly = false) {
    score = 0; combo = 0; wrongStreak = 0; currentIndex = 0;
    activeQueue = []; skippedQueue = []; isPhaseSkipped = false;
    if (!retryWrongOnly) userAnswers = {};

    const urlParams = new URLSearchParams(window.location.search);
    const configShuffleQ = urlParams.get('sq') !== 'false'; 
    const configTime = parseInt(urlParams.get('time')) || 0;

    if (retryWrongOnly) {
        let wrongIndices = [];
        originalQuiz.forEach((item, idx) => {
            if (userAnswers.hasOwnProperty(idx)) {
                if (userAnswers[idx] !== item.c) wrongIndices.push(idx);
            }
        });
        
        if (wrongIndices.length === 0) {
            alert("Bạn không có câu sai nào để làm lại!");
            return;
        }

        userAnswers = {}; 
        sessionQuiz = originalQuiz.map((item, originalIdx) => {
             let options = item.a.map((txt, idx) => ({ text: txt, isCorrect: idx === item.c }));
             return { q: item.q, a: options.map(opt => opt.text), c: options.findIndex(opt => opt.isCorrect), originalId: originalIdx };
        });
        
        activeQueue = wrongIndices;
        if(configShuffleQ) shuffleArray(activeQueue);
    } else {
        sessionQuiz = originalQuiz.map((item, originalIdx) => {
            let options = item.a.map((txt, idx) => ({ text: txt, isCorrect: idx === item.c }));
            return { q: item.q, a: options.map(opt => opt.text), c: options.findIndex(opt => opt.isCorrect), originalId: originalIdx };
        });

        let indices = sessionQuiz.map((_, i) => i);
        if(configShuffleQ) shuffleArray(indices);
        activeQueue = indices;
    }
    
    sessionTotal = activeQueue.length;

    elInterface.style.display = "flex";
    elResult.style.display = "none";
    elControlPopup.style.display = "flex";

    if (configTime > 0) {
        timeLeft = configTime * 60;
        startCountdown();
    } else {
        timeLeft = 0;
        startCountUp();
    }

    updateStats();
    loadQuestion();
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startCountdown() {
    clearInterval(timerInterval);
    updateTimerDisplay(timeLeft);
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay(timeLeft);
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("⏰ Hết giờ! Bài thi sẽ tự động nộp.");
            finishGame();
        }
    }, 1000);
}

function startCountUp() {
    clearInterval(timerInterval);
    updateTimerDisplay(timeLeft);
    timerInterval = setInterval(() => {
        timeLeft++;
        updateTimerDisplay(timeLeft);
    }, 1000);
}

function updateTimerDisplay(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    elTimer.innerText = `${m}:${s}`;
    
    const urlParams = new URLSearchParams(window.location.search);
    const limit = parseInt(urlParams.get('time')) || 0;
    
    if (limit > 0 && seconds < 60) elTimer.classList.add('danger');
    else elTimer.classList.remove('danger');
}

function loadQuestion() {
    clearTimeout(autoNextTimer);

    const qIndex = activeQueue[currentIndex];
    const data = sessionQuiz[qIndex];
    const hasAnswered = userAnswers.hasOwnProperty(qIndex);

    elQuestion.innerText = data.q;
    elAnswers.innerHTML = "";

    if (isPhaseSkipped) {
        document.getElementById("phase-display").style.display = "inline-block";
        elCounter.innerText = `Câu bỏ qua ${currentIndex + 1}/${activeQueue.length}`;
    } else {
        document.getElementById("phase-display").style.display = "none";
        elCounter.innerText = `Câu ${currentIndex + 1}/${activeQueue.length}`;
    }

    const labels = ["A", "B", "C", "D"];
    data.a.forEach((ans, idx) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = `<b>${labels[idx]}.</b> ${ans}`;
        
        if (hasAnswered) {
            btn.disabled = true;
            const userPick = userAnswers[qIndex];
            if (idx === data.c) btn.classList.add("correct");
            if (idx === userPick && userPick !== data.c) btn.classList.add("wrong");
            if (idx === userPick) btn.classList.add("user-selected");
        } else {
            btn.onclick = () => checkAnswer(qIndex, idx, btn);
        }
        elAnswers.appendChild(btn);
    });

    elBtnPrev.disabled = (currentIndex === 0 && !isPhaseSkipped);
    
    if (hasAnswered) {
        elBtnSkip.style.display = "none";
        elBtnNext.style.display = "block";
    } else {
        elBtnSkip.style.display = "block";
        elBtnNext.style.display = "none";
    }

    updateStats();
}

function checkAnswer(qIndex, selectedIdx, btnElement) {
    const data = sessionQuiz[qIndex];
    const isCorrect = selectedIdx === data.c;
    userAnswers[qIndex] = selectedIdx;

    const allBtns = elAnswers.querySelectorAll(".option-btn");
    allBtns.forEach((btn, idx) => {
        btn.disabled = true;
        
        if (idx === data.c) {
            btn.classList.add("correct");
            if (!isCorrect) {
                btn.classList.add("flash-correct");
            }
        }
        
        if (idx === selectedIdx && !isCorrect) {
            btn.classList.add("wrong");
        }
    });

    if (isCorrect) {
        score++; combo++; wrongStreak = 0;
        triggerMiniConfetti(btnElement);
    } else {
        combo = 0; wrongStreak++;
    }

    elBtnNext.style.display = "block";
    elBtnSkip.style.display = "none";
    updateStats();

    autoNextTimer = setTimeout(() => {
        nextQuestion();
    }, 1200);
}

function nextQuestion() {
    clearTimeout(autoNextTimer);
    if (currentIndex < activeQueue.length - 1) {
        currentIndex++;
        loadQuestion();
    } else {
        handleEndOfQueue();
    }
}

function skipQuestion() {
    clearTimeout(autoNextTimer);
    const qIndex = activeQueue[currentIndex];
    skippedQueue.push(qIndex);
    if (currentIndex < activeQueue.length - 1) {
        currentIndex++;
        loadQuestion();
    } else {
        handleEndOfQueue();
    }
}

function goBack() {
    clearTimeout(autoNextTimer);
    if (currentIndex > 0) {
        currentIndex--;
        loadQuestion();
    }
}

function handleEndOfQueue() {
    if (!isPhaseSkipped && skippedQueue.length > 0) {
        if(confirm(`Bạn đã bỏ qua ${skippedQueue.length} câu. Bạn có muốn làm lại ngay bây giờ không?`)) {
             isPhaseSkipped = true;
            activeQueue = [...skippedQueue];
            skippedQueue = [];
            currentIndex = 0;
            loadQuestion();
        } else {
            finishGame();
        }
    } else {
        finishGame();
    }
}

function updateStats() {
    const pct = ((currentIndex + 1) / activeQueue.length) * 100;
    elProgressBar.style.width = `${pct}%`;
    elCombo.innerText = combo > 0 ? `🔥 ${combo}` : "";
}

function finishGame() {
    clearInterval(timerInterval);
    elInterface.style.display = "none";
    elResult.style.display = "block";
    elControlPopup.style.display = "none"; 
    
    elResultTime.innerText = `Thời gian làm bài: ${elTimer.innerText}`;

    const total = sessionTotal; 
    const correctCount = score;
    const wrongCount = total - score;
    const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

    const circle = document.getElementById("score-circle");
    circle.style.background = `conic-gradient(var(--success) ${percent}%, var(--border-color) 0%)`;
    document.getElementById("final-score").innerText = `${percent}%`;

    document.getElementById("txt-correct").innerText = `${correctCount}/${total}`;
    document.getElementById("txt-wrong").innerText = wrongCount;

    elReviewContainer.innerHTML = "";
    let hasWrong = false;

    sessionQuiz.forEach((item, qIndex) => {
        const uAns = userAnswers[qIndex];
        const correctAns = item.c;
        if (uAns !== undefined && uAns !== correctAns) {
            hasWrong = true;
            const labels = ["A", "B", "C", "D"];
            
            const div = document.createElement("div");
            div.className = "review-item";
            div.innerHTML = `
                <div class="review-question">Câu ${qIndex + 1}: ${item.q}</div>
                <div class="review-detail">
                    <div style="color: var(--danger)">❌ Bạn chọn: ${labels[uAns]}. ${item.a[uAns]}</div>
                    <div style="color: var(--success)">✅ Đáp án đúng: ${labels[correctAns]}. ${item.a[correctAns]}</div>
                </div>
            `;
            div.onclick = function() {
                this.classList.toggle("active");
            }
            elReviewContainer.appendChild(div);
        }
    });

    if (!hasWrong) {
        elReviewContainer.innerHTML = `<p style="color: var(--success); font-weight: bold;">Xuất sắc! Bạn không sai câu nào! 🎉</p>`;
        elBtnRetryWrong.style.display = "none";
    } else {
        elBtnRetryWrong.style.display = "block";
    }
}

function retryWrongAnswers() {
    initGame(true);
}

initGame(false);
</script>
