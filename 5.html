<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cơ sở Văn hóa Việt Nam - Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    /* --- CSS BIẾN ĐỔI GIAO DIỆN --- */
    :root {
        --primary: #d32f2f;
        --secondary: #64748b;
        --success: #16a34a;
        --danger: #dc2626;
        
        --bg-color: #fef2f2;
        --card-bg: #ffffff;
        --text-main: #0f172a;
        --text-sub: #475569;
        --border-color: #e2e8f0;
        --btn-bg: #f1f5f9;
        --shadow: rgba(0,0,0,0.1);
    }

    body.dark-mode {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-main: #e2e8f0;
        --text-sub: #94a3b8;
        --border-color: #333333;
        --btn-bg: #2d2d2d;
        --shadow: rgba(0,0,0,0.5);
        --danger: #ef5350; 
        --success: #66bb6a; 
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s, color 0.3s; }

    /* HEADER */
    .header {
        padding: 10px 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 10px var(--shadow); z-index: 10; flex-shrink: 0; font-size: 0.95rem;
    }
    .header-item { display: flex; align-items: center; gap: 5px; font-weight: 700; }
    #timer-display { background: rgba(0,0,0,0.25); padding: 4px 12px; border-radius: 12px; font-family: monospace; font-size: 1.1rem; letter-spacing: 0.5px; }
    #timer-display.danger { background: #ef4444; animation: pulse 1s infinite; }
    .combo-badge { background: rgba(255,255,255,0.25); padding: 3px 10px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; }
    
    .progress-container { width: 100%; height: 4px; background: var(--border-color); flex-shrink: 0; }
    .progress-bar { height: 100%; background: var(--success); width: 0%; transition: width 0.3s ease; }

    /* CONTAINER */
    .container { width: 100%; max-width: 100%; background: var(--card-bg); display: flex; flex-direction: column; flex-grow: 1; position: relative; overflow: hidden; transition: background 0.3s; }

    /* VÙNG NỘI DUNG */
    .quiz-body { padding: 20px 15px; overflow-y: auto; flex-grow: 1; padding-bottom: 120px; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; }

    .phase-badge { display: none; background: #0ea5e9; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 15px; font-weight: bold; width: fit-content; }
    .question-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; line-height: 1.5; color: var(--text-main); word-wrap: break-word; }
    .options-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }

    .option-btn { 
        width: 100%; text-align: left; padding: 15px; border: 2px solid var(--border-color); background: var(--card-bg); border-radius: 14px; font-size: 1rem; font-weight: 600; color: var(--text-sub); cursor: pointer; position: relative; line-height: 1.4; word-wrap: break-word; transition: all 0.2s; 
    }
    .option-btn:active { background: var(--btn-bg); transform: scale(0.98); }
    
    .option-btn.correct { border-color: var(--success); background: rgba(22, 163, 74, 0.1); color: var(--success); }
    .option-btn.correct::after { content: "✓"; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-weight: 900; font-size: 1.2rem; }
    
    .option-btn.wrong { border-color: var(--danger); background: rgba(220, 38, 38, 0.1); color: var(--danger); }
    .option-btn.wrong::after { content: "✕"; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-weight: 900; font-size: 1.2rem; }
    .option-btn.user-selected { border-width: 2px; }

    /* HIỆU ỨNG NHÁY XANH ĐÁP ÁN ĐÚNG KHI CHỌN SAI */
    @keyframes flashGreen {
        0%, 100% { background: rgba(22, 163, 74, 0.1); border-color: var(--success); transform: scale(1); }
        50% { background: rgba(22, 163, 74, 0.35); border-color: #15803d; transform: scale(1.02); }
    }
    .flash-correct { animation: flashGreen 1s ease; }

    /* POPUP MENU */
    .control-popup {
        position: fixed; bottom: 50px; right: 15px; background: var(--card-bg); backdrop-filter: blur(10px); padding: 8px; border-radius: 30px; box-shadow: 0 5px 25px var(--shadow); display: flex; flex-direction: row; gap: 10px; z-index: 100; border: 1px solid var(--border-color); touch-action: none; 
    }
    
    .btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: transform 0.1s; flex-shrink: 0; background: var(--btn-bg); color: var(--text-sub); }
    .btn:active { transform: scale(0.9); }
    .btn-skip { background: #fff7ed; color: #d97706; }
    body.dark-mode .btn-skip { background: #451a03; color: #fbbf24; }
    .btn-next { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(211, 47, 47, 0.3); }
    
    .btn-move { width: 32px; height: 32px; font-size: 1.1rem; position: absolute; top: -15px; right: 5px; border: 2px solid var(--card-bg); background: var(--secondary); color: white; z-index: 101; cursor: grab; }
    .btn-move:active { cursor: grabbing; }
    .btn-theme { width: 32px; height: 32px; font-size: 1rem; position: absolute; top: -15px; left: 5px; border: 2px solid var(--card-bg); background: #333; color: #ffd700; z-index: 101; }

    /* RESULT SCREEN */
    .result-screen { text-align: center; padding: 30px 20px; display: none; overflow-y: auto; height: 100%; background: var(--card-bg); z-index: 50; }
    .score-circle { width: 150px; height: 150px; border-radius: 50%; background: conic-gradient(var(--success) 0%, var(--border-color) 0%); margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; color: var(--text-main); position: relative; }
    .score-circle::before { content: ''; position: absolute; width: 120px; height: 120px; background: var(--card-bg); border-radius: 50%; transition: background 0.3s; }
    .score-text { position: relative; z-index: 2; }

    .review-box { text-align: left; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px; }
    .review-item { background: rgba(220, 38, 38, 0.05); border: 1px solid var(--danger); border-radius: 12px; padding: 15px; margin-bottom: 12px; cursor: pointer; }
    .review-question { font-weight: bold; font-size: 1rem; margin-bottom: 8px; color: var(--text-main); }
    .review-detail { display: none; margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 8px; font-size: 0.95rem; }
    .review-item.active .review-detail { display: block; }
</style>
</head>
<body>

<div class="header">
    <div class="header-item" id="timer-display">00:00</div>
    <div class="header-item" id="question-counter">1/110</div>
    <div class="combo-badge" id="combo-display">🔥 0</div>
</div>
<div class="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
</div>

<div class="container">
    <div id="quiz-interface" style="display: flex; flex-direction: column; height: 100%;">
        <div class="quiz-body">
            <div id="phase-display" class="phase-badge">LÀM LẠI CÂU BỎ QUA</div>
            <h2 class="question-text" id="question">Đang tải...</h2>
            <div class="options-grid" id="answers"></div>
        </div>

        <div class="control-popup" id="control-popup">
            <button class="btn btn-theme" onclick="toggleTheme()">🌗</button>
            <button class="btn btn-move" id="drag-handle">⇄</button>
            
            <button class="btn btn-prev" id="btn-prev" onclick="goBack()">⬅</button>
            <button class="btn btn-skip" id="btn-skip" onclick="skipQuestion()">⤵</button>
            <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">➜</button>
        </div>
    </div>

    <div id="result-interface" class="result-screen">
        <h2>🎉 Hoàn thành!</h2>
        <div style="font-size: 1rem; color: var(--text-sub); margin-bottom: 20px;" id="result-time">Thời gian: 00:00</div>
        
        <div class="score-circle" id="score-circle">
            <span class="score-text" id="final-score">0%</span>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px; text-align:left">
            <div style="background:var(--btn-bg); padding:15px; border-radius:12px"><b>✅ Đúng</b><span id="txt-correct" style="display:block; font-size:1.3rem; color:var(--success)">0</span></div>
            <div style="background:var(--btn-bg); padding:15px; border-radius:12px"><b>❌ Sai</b><span id="txt-wrong" style="display:block; font-size:1.3rem; color:var(--danger)">0</span></div>
        </div>

        <div style="display:flex; flex-direction: column; gap:10px; margin-bottom: 30px;">
             <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#94a3b8; color:white; width:100%; border-radius:15px; font-size: 1rem;" onclick="window.location.href='index.html'">🏠 Trang chủ</button>
                <button class="btn" style="background:var(--primary); color:white; width:100%; border-radius:15px; font-size: 1rem;" onclick="location.reload()">🔄 Làm lại tất cả</button>
             </div>
             <button id="btn-retry-wrong" class="btn" style="background:#dc2626; color:white; width:100%; border-radius:15px; display:none; font-size: 1rem;" onclick="retryWrongAnswers()">⚠️ Làm lại câu sai</button>
        </div>

        <h3 style="text-align: left; color: var(--danger); border-bottom: 2px solid var(--border-color); padding-bottom: 5px;">Xem lại câu sai 👇</h3>
        <div id="review-container" class="review-box">
            <p style="color: var(--text-sub); font-style: italic;">Bạn làm đúng hết rồi! Giỏi quá! 👏</p>
        </div>
    </div>
</div>

<script>
// --- HIỆU ỨNG NỔ NHẸ KHI CHỌN ĐÁP ÁN ĐÚNG ---
function triggerMiniConfetti(btn) {
    const rect = btn.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const colors = ['#f44336', '#4caf50', '#2196f3', '#ffeb3b', '#9c27b0'];
    
    for (let i = 0; i < 25; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'fixed';
        particle.style.left = centerX + 'px';
        particle.style.top = centerY + 'px';
        particle.style.width = '7px';
        particle.style.height = '7px';
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.borderRadius = '50%';
        particle.style.pointerEvents = 'none';
        particle.style.zIndex = '9999';
        document.body.appendChild(particle);

        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 50 + 20; 
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity - 20; 

        particle.animate([
            { transform: 'translate(0, 0) scale(1)', opacity: 1 },
            { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
        ], {
            duration: 600 + Math.random() * 300,
            easing: 'cubic-bezier(0, .9, .57, 1)'
        }).onfinish = () => particle.remove();
    }
}

// --- DRAGGABLE MENU LOGIC ---
const popup = document.getElementById('control-popup');
const handle = document.getElementById('drag-handle');
let isDragging = false, offsetX, offsetY;

handle.addEventListener('mousedown', startDrag);
handle.addEventListener('touchstart', startDrag, {passive: false});

function startDrag(e) {
    e.preventDefault();
    isDragging = true;
    const clientX = e.clientX || e.touches[0].clientX;
    const clientY = e.clientY || e.touches[0].clientY;
    const rect = popup.getBoundingClientRect();
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;

    document.addEventListener('mousemove', onDrag);
    document.addEventListener('touchmove', onDrag, {passive: false});
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);
}

function onDrag(e) {
    if (!isDragging) return;
    e.preventDefault();
    const clientX = e.clientX || e.touches[0].clientX;
    const clientY = e.clientY || e.touches[0].clientY;

    let newLeft = clientX - offsetX;
    let newTop = clientY - offsetY;

    const maxX = window.innerWidth - popup.offsetWidth;
    const maxY = window.innerHeight - popup.offsetHeight;

    newLeft = Math.max(0, Math.min(newLeft, maxX));
    newTop = Math.max(0, Math.min(newTop, maxY));

    popup.style.left = newLeft + 'px';
    popup.style.top = newTop + 'px';
    popup.style.right = 'auto'; 
    popup.style.bottom = 'auto'; 
}

function stopDrag() {
    isDragging = false;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchend', stopDrag);
}

// --- DARK MODE ---
function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
}

// --- DATA CÂU HỎI TRÍCH XUẤT TỪ PDF (110 Câu) ---
const originalQuiz = [
  {q: "Câu 1. “Hệ thống các giá trị vật chất và tinh thần do con người sáng tạo và tích lũy qua quá trình hoạt động thực tiễn, trong sự tương tác giữa con người với môi trường tự nhiên và xã hội của mình” là định nghĩa về:", a: ["Văn hóa", "Văn vật", "Văn hiến", "Văn minh"], c: 0},
  {q: "Câu 2. Sự khác nhau giữa văn hóa và văn minh ở tính giá trị là:", a: ["Văn hóa thiên về giá trị vật chất, văn minh thiên về giá trị tinh thần", "Văn hóa thiên về giá trị tinh thần, văn minh thiên về giá trị vật chất", "Văn hóa chứa đựng cả giá trị vật chất và tinh thần, văn minh chỉ thiên về giá trị tinh thần", "Văn hóa bao gồm cả giá trị vật chất và tinh thần, văn minh thì thiên về các giá trị vật chất."], c: 3},
  {q: "Câu 3. Về mặt phạm vi, sự khác biệt giữa văn hóa và văn minh thể hiện ở:", a: ["Văn hóa mang tính nhân loại, văn minh mang tính dân tộc", "Văn hóa mang tính dân tộc, văn minh mang tính quốc tế", "Văn hóa mang tính quốc tế, văn minh mang tính nhân loại", "Văn hóa mang tính vùng miền, văn minh mang tính địa phương"], c: 1},
  {q: "Câu 4. Các đặc trưng cơ bản của văn hóa gồm:", a: ["Tính hệ thống, tính giá trị, tính nhân sinh, tính lịch sử", "Tính cấu trúc, tính giá trị, tính nhân sinh, tính quốc tế", "Tính hệ thống, tính lịch sử, tính thẩm mĩ, tính giáo dục", "Tính cấu trúc, tính hình tượng, tính phổ biến, tính sáng tạo"], c: 0},
  {q: "Câu 5. Tính hệ thống giúp văn hóa thực hiện được chức năng nào sau đây:", a: ["Chức năng tổ chức xã hội", "Chức năng điều chỉnh xã hội", "Chức năng giao tiếp", "Chức năng giáo dục"], c: 0},
  {q: "Câu 6. Tính giá trị giúp văn hóa thực hiện được chức năng nào sau đây:", a: ["Chức năng tổ chức xã hội", "Chức năng điều chỉnh xã hội", "Chức năng giao tiếp", "Chức năng giáo dục"], c: 3},
  {q: "Câu 7. Chức năng điều chỉnh của văn hóa thể hiện ở việc:", a: ["Hình thành trong một quá trình và tích lũy qua nhiều thế hệ", "Giúp cho xã hội được trạng thái cân bằng động, không ngừng tự hoàn thiện, động lực cho sự phát triển của xã hội", "Bảo đảm tính kế tục lịch sử của văn hóa", "Làm tăng độ ổn định, là nền tảng của xã hội"], c: 1},
  {q: "Câu 8. Chức năng tổ chức của văn hóa thể hiện ở:", a: ["Hình thành trong một quá trình và tích lũy qua nhiều thế hệ", "Giúp cho xã hội được trạng thái cân bằng động, không ngừng tự hoàn thiện...", "Bảo đảm tính kế tục lịch sử của văn hóa", "Làm tăng độ ổn định, là nền tảng của xã hội"], c: 3},
  {q: "Câu 9. Theo GS. Trần Ngọc Thêm, tiến trình văn hóa Việt Nam có thể chia thành:", a: ["3 lớp – 6 giai đoạn văn hóa", "3 lớp – 3 giai đoạn văn hóa", "4 lớp – 6 giai đoạn văn hóa", "6 lớp – 3 giai đoạn văn hóa"], c: 0},
  {q: "Câu 10. Các giai đoạn trong tiến trình lịch sử văn hóa Việt Nam là:", a: ["Tiền sử – Văn Lang - Âu Lạc – Đại Việt – Đại Nam – hiện đại", "Bản địa – Văn Lang – chống Bắc thuộc – Đại Việt – Đại Nam", "Tiền sử – Văn Lang, Âu Lạc – Bắc thuộc – Đại Việt – Đại Nam – hiện đại", "Bản địa – Văn Lang, Âu Lạc – Bắc thuộc – Đại Việt – Đại Nam – hiện đại"], c: 2},
  {q: "Câu 11. Các lớp lịch sử văn hóa Việt Nam bao gồm:", a: ["Lớp văn hóa tiền sử, lớp văn hóa giao lưu với Trung Hoa, giao lưu phương Tây", "Lớp văn hóa bản địa, lớp văn hóa giao lưu với Trung Hoa, lớp văn hóa giao lưu với phương Tây", "Tiền sử – Chống Bắc thuộc – giao lưu với Pháp", "Bản địa – Trung Hoa – Nhật Bản"], c: 1},
  {q: "Câu 12. Lớp văn hóa bản địa là thành tựu của giai đoạn văn hóa nào?", a: ["Giai đoạn văn hoá tiền sử và giai đoạn văn hóa Văn Lang - Âu Lạc", "Giai đoạn văn hóa Văn Lang- Âu Lạc và thời kỳ Bắc thuộc", "Giai đoạn văn hóa thời kỳ Bắc thuộc và văn hóa Đại Việt", "Giai đoạn văn hóa Đại Việt và Đại Nam"], c: 0},
  {q: "Câu 13. Thành tựu nổi bật của giai đoạn văn hóa Văn Lang - Âu Lạc là:", a: ["Nghề thủ công mỹ nghệ", "Kỹ thuật đúc đồng thau", "Nghề trồng dâu nuôi tằm", "Kỹ thuật chế tạo đồ sắt"], c: 1},

const elBtnNext = document.getElementById("btn-next");
const elBtnSkip = document.getElementById("btn-skip");
const elBtnPrev = document.getElementById("btn-prev");
const elTimer = document.getElementById("timer-display");
const elResultTime = document.getElementById("result-time");
const elControlPopup = document.getElementById("control-popup");
const elReviewContainer = document.getElementById("review-container");
const elBtnRetryWrong = document.getElementById("btn-retry-wrong");

function initGame(retryWrongOnly = false) {
    score = 0; combo = 0; wrongStreak = 0; currentIndex = 0;
    activeQueue = []; skippedQueue = []; isPhaseSkipped = false;
    if (!retryWrongOnly) userAnswers = {};

    if (retryWrongOnly) {
        let wrongIndices = [];
        originalQuiz.forEach((item, idx) => {
            if (userAnswers.hasOwnProperty(idx)) {
                if (userAnswers[idx] !== item.c) wrongIndices.push(idx);
            }
        });
        
        if (wrongIndices.length === 0) {
            alert("Bạn không có câu sai nào để làm lại!");
            return;
        }

        userAnswers = {}; 
        sessionQuiz = originalQuiz.map((item, originalIdx) => {
             let options = item.a.map((txt, idx) => ({ text: txt, isCorrect: idx === item.c }));
             return { q: item.q, a: options.map(opt => opt.text), c: options.findIndex(opt => opt.isCorrect), originalId: originalIdx };
        });
        
        activeQueue = wrongIndices;
    } else {
        sessionQuiz = originalQuiz.map((item, originalIdx) => {
            let options = item.a.map((txt, idx) => ({ text: txt, isCorrect: idx === item.c }));
            return { q: item.q, a: options.map(opt => opt.text), c: options.findIndex(opt => opt.isCorrect), originalId: originalIdx };
        });

        let indices = sessionQuiz.map((_, i) => i);
        activeQueue = indices;
    }
    
    sessionTotal = activeQueue.length;

    elInterface.style.display = "flex";
    elResult.style.display = "none";
    elControlPopup.style.display = "flex";

    timeLeft = 0;
    startCountUp();

    updateStats();
    loadQuestion();
}

function startCountUp() {
    clearInterval(timerInterval);
    updateTimerDisplay(timeLeft);
    timerInterval = setInterval(() => {
        timeLeft++;
        updateTimerDisplay(timeLeft);
    }, 1000);
}

function updateTimerDisplay(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    elTimer.innerText = `${m}:${s}`;
}

function loadQuestion() {
    clearTimeout(autoNextTimer);

    const qIndex = activeQueue[currentIndex];
    const data = sessionQuiz[qIndex];
    const hasAnswered = userAnswers.hasOwnProperty(qIndex);

    elQuestion.innerText = data.q;
    elAnswers.innerHTML = "";

    if (isPhaseSkipped) {
        document.getElementById("phase-display").style.display = "inline-block";
        elCounter.innerText = `Câu bỏ qua ${currentIndex + 1}/${activeQueue.length}`;
    } else {
        document.getElementById("phase-display").style.display = "none";
        elCounter.innerText = `Câu ${currentIndex + 1}/${activeQueue.length}`;
    }

    const labels = ["A", "B", "C", "D"];
    data.a.forEach((ans, idx) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = `<b>${labels[idx]}.</b> ${ans}`;
        
        if (hasAnswered) {
            btn.disabled = true;
            const userPick = userAnswers[qIndex];
            if (idx === data.c) btn.classList.add("correct");
            if (idx === userPick && userPick !== data.c) btn.classList.add("wrong");
            if (idx === userPick) btn.classList.add("user-selected");
        } else {
            btn.onclick = () => checkAnswer(qIndex, idx, btn);
        }
        elAnswers.appendChild(btn);
    });

    elBtnPrev.disabled = (currentIndex === 0 && !isPhaseSkipped);
    
    if (hasAnswered) {
        elBtnSkip.style.display = "none";
        elBtnNext.style.display = "block";
    } else {
        elBtnSkip.style.display = "block";
        elBtnNext.style.display = "none";
    }

    updateStats();
}

function checkAnswer(qIndex, selectedIdx, btnElement) {
    const data = sessionQuiz[qIndex];
    const isCorrect = selectedIdx === data.c;
    userAnswers[qIndex] = selectedIdx;

    const allBtns = elAnswers.querySelectorAll(".option-btn");
    allBtns.forEach((btn, idx) => {
        btn.disabled = true;
        
        if (idx === data.c) {
            btn.classList.add("correct");
            if (!isCorrect) {
                btn.classList.add("flash-correct");
            }
        }
        
        if (idx === selectedIdx && !isCorrect) {
            btn.classList.add("wrong");
        }
    });

    if (isCorrect) {
        score++; combo++; wrongStreak = 0;
        triggerMiniConfetti(btnElement);
    } else {
        combo = 0; wrongStreak++;
    }

    elBtnNext.style.display = "block";
    elBtnSkip.style.display = "none";
    updateStats();

    autoNextTimer = setTimeout(() => {
        nextQuestion();
    }, 1200);
}

function nextQuestion() {
    clearTimeout(autoNextTimer);
    if (currentIndex < activeQueue.length - 1) {
        currentIndex++;
        loadQuestion();
    } else {
        handleEndOfQueue();
    }
}

function skipQuestion() {
    clearTimeout(autoNextTimer);
    const qIndex = activeQueue[currentIndex];
    skippedQueue.push(qIndex);
    if (currentIndex < activeQueue.length - 1) {
        currentIndex++;
        loadQuestion();
    } else {
        handleEndOfQueue();
    }
}

function goBack() {
    clearTimeout(autoNextTimer);
    if (currentIndex > 0) {
        currentIndex--;
        loadQuestion();
    }
}

function handleEndOfQueue() {
    if (!isPhaseSkipped && skippedQueue.length > 0) {
        if(confirm(`Bạn đã bỏ qua ${skippedQueue.length} câu. Bạn có muốn làm lại ngay bây giờ không?`)) {
             isPhaseSkipped = true;
            activeQueue = [...skippedQueue];
            skippedQueue = [];
            currentIndex = 0;
            loadQuestion();
        } else {
            finishGame();
        }
    } else {
        finishGame();
    }
}

function updateStats() {
    const pct = ((currentIndex + 1) / activeQueue.length) * 100;
    elProgressBar.style.width = `${pct}%`;
    elCombo.innerText = combo > 0 ? `🔥 ${combo}` : "";
}

function finishGame() {
    clearInterval(timerInterval);
    elInterface.style.display = "none";
    elResult.style.display = "block";
    elControlPopup.style.display = "none"; 
    
    elResultTime.innerText = `Thời gian làm bài: ${elTimer.innerText}`;

    const total = sessionTotal; 
    const correctCount = score;
    const wrongCount = total - score;
    const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

    const circle = document.getElementById("score-circle");
    circle.style.background = `conic-gradient(var(--success) ${percent}%, var(--border-color) 0%)`;
    document.getElementById("final-score").innerText = `${percent}%`;

    document.getElementById("txt-correct").innerText = `${correctCount}/${total}`;
    document.getElementById("txt-wrong").innerText = wrongCount;

    elReviewContainer.innerHTML = "";
    let hasWrong = false;

    sessionQuiz.forEach((item, qIndex) => {
        const uAns = userAnswers[qIndex];
        const correctAns = item.c;
        if (uAns !== undefined && uAns !== correctAns) {
            hasWrong = true;
            const labels = ["A", "B", "C", "D"];
            
            const div = document.createElement("div");
            div.className = "review-item";
            div.innerHTML = `
                <div class="review-question">Câu ${qIndex + 1}: ${item.q}</div>
                <div class="review-detail">
                    <div style="color: var(--danger)">❌ Bạn chọn: ${labels[uAns]}. ${item.a[uAns]}</div>
                    <div style="color: var(--success)">✅ Đáp án đúng: ${labels[correctAns]}. ${item.a[correctAns]}</div>
                </div>
            `;
            div.onclick = function() {
                this.classList.toggle("active");
            }
            elReviewContainer.appendChild(div);
        }
    });

    if (!hasWrong) {
        elReviewContainer.innerHTML = `<p style="color: var(--success); font-weight: bold;">Xuất sắc! Bạn không sai câu nào! 🎉</p>`;
        elBtnRetryWrong.style.display = "none";
    } else {
        elBtnRetryWrong.style.display = "block";
    }
}

function retryWrongAnswers() {
    initGame(true);
}

initGame(false);
</script>
</body>
</html>
